services:
  coffee-advisor-api:
    build:
      context: .
      dockerfile: Dockerfile

    # Nama container yang mudah diingat
    container_name: coffebot

    ports:
      - "8000:8000"

    env_file:
      - .env

    # Override env individual (opsional, prioritas lebih tinggi dari .env)
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}  
      - PYTHONUNBUFFERED=1

    # Auto restart kecuali di-stop manual
    restart: unless-stopped

    # Healthcheck — compose akan tunggu healthy sebelum depend_on service lain
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    volumes:
      - ./app:/app/app

